<!DOCTYPE html>
<html>

<head>
    <title>3D Linked Data Visualization</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script type="module">
        import * as THREE from 'three';
        import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
        import {FontLoader} from 'three/addons/loaders/FontLoader.js';
        import {Line2} from 'three/addons/lines/Line2.js';
        import {LineMaterial} from 'three/addons/lines/LineMaterial.js';
        import {LineGeometry} from 'three/addons/lines/LineGeometry.js';

        const lineMaterials = [];

        // ── Scene ────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.035);

        const aspect = window.innerWidth / window.innerHeight;
        const size = 4;
        const camera = new THREE.OrthographicCamera(
            -size * aspect, // left
            size * aspect,  // right
            size,           // top
            -size,          // bottom
            0.1,            // near
            1000            // far
        );
        camera.position.set(-6, 8, 15);
        camera.lookAt(0, 2.55, 0);

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2.55, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.update();

        let [x, y, z] = [2, -3, 6];
        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 5.8));
        const key = new THREE.DirectionalLight(0xccddff, 1.0);
        key.position.set(x, y, z);
        scene.add(key);
        // const pl1 = new THREE.DirectionalLight(0xffffff, 10);
        // pl1.position.x = x;
        // pl1.position.y = y;
        // pl1.position.z = z;
        // scene.add(pl1);
        //
        let geo = new THREE.SphereGeometry(0.28, 15, 15);

        let color = 0xffffff;
        const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
            color, roughness: 1, metalness: 0.0,
            emissive: color, emissiveIntensity: 0.65,
        }));
        mesh.position.set(x, y, z);
        scene.add(mesh);

        // const pl2 = new THREE.PointLight(0x00ffff, 4.0, 40);
        // pl2.position.set(6, 4, -4);
        // scene.add(pl2);
        // scene.add(new THREE.GridHelper(30, 15, 0x000000, 0x606060));

        // ── Helpers ──────────────────────────────────────────────────────────

        // Billboard label sprite — always faces camera, unaffected by depth.
        function makeNodeLabel(text, color) {
            const cw = 320, ch = 56;
            const c = document.createElement('canvas');
            c.width = cw; c.height = ch;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
            ctx.font = 'bold 26px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, cw / 2, ch / 2);
            const spr = new THREE.Sprite(new THREE.SpriteMaterial({
                map: new THREE.CanvasTexture(c),
                transparent: true,
                depthTest: false,
            }));
            spr.scale.set(2.0, 0.35, 1);
            return spr;
        }

        // Visible tube between two world-space points.
        function makeTube(a, b, color, r = 0.045) {
            return new THREE.Mesh(
                new THREE.TubeGeometry(new THREE.LineCurve3(a, b), 1, r, 6),
                new THREE.MeshStandardMaterial({
                    color, emissive: color, emissiveIntensity: 0.7,
                    roughness: 0.3, metalness: 0.4,
                }));
        }

        // ── Page class ───────────────────────────────────────────────────────
        class Page {
            constructor({y, color}) {
                this.color = color;
                this.group = new THREE.Group();
                this.group.position.set(0, y, 0);
                scene.add(this.group);

                const geo = new THREE.PlaneGeometry(6, 6);

                const mat = new THREE.MeshBasicMaterial({
                    color, transparent: true, opacity: 0.3, side: THREE.DoubleSide,
                });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.y = 0.005;
                // Tinted fill
                this.group.add(mesh);

                // Fat neon border using Line2 (supports real linewidth + clean joins)
                const borderGeo = new LineGeometry();
                borderGeo.setPositions([
                    -3, 0.01, -3,
                    3, 0.01, -3,
                    3, 0.01, 3,
                    -3, 0.01, 3,
                    -3, 0.01, -3,  // close the loop
                ]);
                const borderMat = new LineMaterial({
                    color,
                    linewidth: Math.min(window.innerWidth, window.innerHeight) / 50,
                    transparent: true,
                    opacity: 1,
                    resolution: new THREE.Vector2(window.innerWidth, window.innerHeight),
                });
                lineMaterials.push(borderMat);
                const border = new Line2(borderGeo, borderMat);
                this.group.add(border);
            }

            // nodeDefs: [{x, z, color, shape, label}]
            // edgeDefs: [[i, j], ...]   (indices into nodeDefs)
            // Returns mesh array so cross-page edges can reference individual nodes.
            addGraph(nodeDefs, edgeDefs) {
                const Y = 0.0;
                const meshes = nodeDefs.map(({x, z}) => {
                    let geo = new THREE.SphereGeometry(0.2, 15, 15);

                    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                        color: this.color, roughness: 0.2, metalness: 0.6,
                    }));
                    mesh.position.set(x, Y, z);
                    this.group.add(mesh);

                    return mesh;
                });


                nodeDefs.forEach((_, i) => {
                    const j = i == 0 ? nodeDefs.length - 1 : i - 1;
                    this.group.add(
                        makeTube(meshes[i].position.clone(),
                            meshes[j].position.clone(),
                            this.color, 0.075));
                })

                // Within-page tubes (group-local positions)
                edgeDefs.forEach(([i, j]) => {
                    this.group.add(
                        makeTube(meshes[i].position.clone(),
                            meshes[j].position.clone(),
                            this.color, 0.075));
                });

                return meshes;
            }

            // Glowing extruded format label pinned to the near-right corner.
            addLabel(font, text, size = 0.95, depth = 0.2) {
                const shapes = font.generateShapes(text, size);
                const geo = new THREE.ExtrudeGeometry(shapes,
                    {steps: 1, depth, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02});
                geo.computeBoundingBox();

                const mainColor = new THREE.Color(this.color);
                const frontColor = mainColor.clone().lerp(new THREE.Color(0xffffff), 0.00);;
                const sideColor = mainColor.clone().lerp(new THREE.Color(0x000000), 0.75);

                const frontMat = new THREE.MeshStandardMaterial({
                    color: frontColor, emissive: frontColor, emissiveIntensity: 0.5,
                    roughness: 0.3, metalness: 0.0,
                });
                const sideMat = new THREE.MeshStandardMaterial({
                    color: sideColor, emissive: sideColor, emissiveIntensity: 0.4,
                    roughness: 0.4, metalness: 0.0,
                });

                const mesh = new THREE.Mesh(geo, [frontMat, sideMat]);
                mesh.position.set(-2.7, 0.02, 2.5 - depth / 2);
                this.group.add(mesh);
            }
        }

        // Cross-page tube — resolves world positions from any two meshes.
        function crossEdge(meshA, meshB, color) {
            const a = new THREE.Vector3(), b = new THREE.Vector3();
            meshA.getWorldPosition(a);
            meshB.getWorldPosition(b);
            scene.add(makeTube(a, b, color, 0.075));
        }

        // ── Pages ────────────────────────────────────────────────────────────
        // const jsonPage = new Page({y: 0, color: 0xff6600}); // 0xffaa22
        // const turtlePage = new Page({y: 1.5, color: 0x00ff66}); // 0x33cc66
        // const sparqlPage = new Page({y: 3.0, color: 0x00bbff}); // 0x3399ff

        const otherPage = new Page({y: 0, color: 0xCC79A7}); // base / system (sky blue)
        const jsonPage = new Page({y: 1.7, color: 0xE69F00}); // JSON-LD (amber)
        const turtlePage = new Page({y: 3.4, color: 0x009E73}); // Turtle (green)
        const sparqlPage = new Page({y: 5.1, color: 0x56B4E9}); // SPARQL (violet)

        const get_points = (point_count, rot) => [...new Array(point_count)].map((_, i) => {
            let angle = i * 2 * Math.PI / point_count;
            let x = Math.cos(angle) * 2.2;
            let y = Math.sin(angle) * 2.5;
            return {x: Math.cos(rot) * x - Math.sin(rot) * y, z: -0.3 + Math.sin(rot) * x + Math.cos(rot) * y}
        })
        // ── Graphs ───────────────────────────────────────────────────────────
        // JSON-LD — data layer: context, two person URIs, a name literal
        const jN = jsonPage.addGraph(get_points(7, Math.PI / 6), [[4, 0], [0, 2]]);

        // Turtle — schema layer: a SHACL shape with two properties
        const tN = turtlePage.addGraph(get_points(7, Math.PI / 6 + Math.PI / 3), []);

        // SPARQL — query layer: subject var, type, bound var, predicate
        const sN = sparqlPage.addGraph(get_points(7, Math.PI / 6 + 2 * Math.PI / 3), [[1, 3], [3, 5], [5, 0]]);

        const oN = otherPage.addGraph(get_points(7, -Math.PI / 6 + 2 * Math.PI / 3), [[1, 3], [3, 5], [5, 0]]);

        // ── Cross-page edges ─────────────────────────────────────────────────

        crossEdge(oN[1], jN[2], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(oN[3], jN[4], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(oN[5], jN[6], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)

        crossEdge(jN[1], tN[0], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(jN[3], tN[2], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(jN[5], tN[4], jN.color);  // :Arthur  →  PersonShape  (data conforms to shape)

        crossEdge(sN[0], tN[1], sN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(sN[2], tN[3], sN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        crossEdge(sN[4], tN[5], sN.color);  // :Arthur  →  PersonShape  (data conforms to shape)
        // crossEdge(tN[3], sN[3], 0x44ffcc);  // :Arthur  →  PersonShape  (data conforms to shape)
        // crossEdge(tN[1], sN[0], 0x44ffcc);  // foaf:Person (schema)  →  ?parson  (query targets same class)
        // crossEdge(jN[2], sN[0], 0xffaa44);  // :Ruben   →  ?parson    (Ruben also matches the query)

        // ── Format labels (async font) ───────────────────────────────────────
        (async () => {
            const font = await new FontLoader().loadAsync('./fonts/helvetiker_bold.typeface.json');
            sparqlPage.addLabel(font, 'SWLS', 1.4, 0.3);
            turtlePage.addLabel(font, 'Turtle');
            jsonPage.addLabel(font, 'JSON-LD');
            otherPage.addLabel(font, "SPARQL");
            // Signal for headless screenshot
            requestAnimationFrame(() => {window.sceneReady = true;});
        })();

        function onResize() {
            const w = innerWidth, h = innerHeight, aspect = w / h;
            camera.left = -size * aspect;
            camera.right = size * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            const lw = Math.min(w, h) / 100;
            lineMaterials.forEach(m => {m.resolution.set(w, h); m.linewidth = lw;});
        }

        // ── Resize ───────────────────────────────────────────────────────────
        window.addEventListener('resize', onResize);

        // ── Render loop ──────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
