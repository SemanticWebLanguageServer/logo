<!DOCTYPE html>
<html>

<head>
    <title>3D Linked Data Visualization</title>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
        }
    }
    </script>
    <style>
        body {
            margin: 0;
            background: #1a1a2e;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script type="module">
        import * as THREE from 'three';
        import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
        import {FontLoader} from 'three/addons/loaders/FontLoader.js';

        // ── Scene ────────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.04);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(11, 15, 18);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // renderer.toneMapping = THREE.ACESFilmicToneMapping;
        // renderer.toneMappingExposure = 1.6;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.update();

        // Lights — neon palette
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const keyLight = new THREE.DirectionalLight(0xccddff, 3.0);
        keyLight.position.set(5, 10, 8);
        scene.add(keyLight);
        const pink = new THREE.PointLight(0xff00cc, 5.0, 40);
        pink.position.set(-5, 8, 5);
        scene.add(pink);
        const cyan = new THREE.PointLight(0x00ffff, 4.0, 40);
        cyan.position.set(6, 4, -4);
        scene.add(cyan);

        // Floor grid
        scene.add(new THREE.GridHelper(28, 28, 0x334466, 0x222244));

        // ── Page class ───────────────────────────────────────────────────────
        // All elements live in this.group.
        // Call addCode(font, lines, color) and addLabel(font, text) after the
        // font is loaded — both produce real 3-D ExtrudeGeometry meshes.
        class Page {
            constructor({ y, color }) {
                this.color = color;

                this.group = new THREE.Group();
                this.group.position.set(0, y, 0);
                scene.add(this.group);

                const geo = new THREE.PlaneGeometry(6, 6);

                // Tinted background — plain MeshBasicMaterial, no canvas needed
                const plane = new THREE.Mesh(geo,
                    new THREE.MeshBasicMaterial({
                        color, transparent: true, opacity: 0.18, side: THREE.DoubleSide,
                    }));
                plane.rotation.x = -Math.PI / 2;
                this.group.add(plane);

                // Neon border
                const border = new THREE.LineSegments(
                    new THREE.EdgesGeometry(geo),
                    new THREE.LineBasicMaterial({color, transparent: true, opacity: 1.0}));
                border.rotation.x = -Math.PI / 2;
                border.position.y = 0.005;
                this.group.add(border);
            }

            // 3-D extruded code — thinner than the format label.
            // All lines share one material instance for efficiency.
            addCode(font, lines, codeColor) {
                const size  = 0.14;   // font size in world units
                const depth = 0.018;  // extrusion depth (< label's 0.06)
                const lineH = 0.24;   // vertical spacing between lines
                const charW = size * 0.65; // approx monospace advance width

                const mat = new THREE.MeshStandardMaterial({
                    color:             codeColor,
                    roughness:         0.2,
                    metalness:         0.5,
                    emissive:          codeColor,
                    emissiveIntensity: 0.8,
                });

                lines.forEach((line, i) => {
                    if (!line.trim()) return; // blank lines only advance spacing
                    const trimmed = line.trimStart();
                    const indent  = line.length - trimmed.length;
                    const shapes  = font.generateShapes(trimmed, size);
                    if (!shapes.length) return;
                    const geo  = new THREE.ExtrudeGeometry(shapes,
                        {steps: 1, depth, bevelEnabled: false});
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.rotation.x = -Math.PI / 2;
                    // x: left-aligned with indent; z: lines spread toward viewer
                    mesh.position.set(-2.7 + indent * charW, 0.01, -2.2 + i * lineH);
                    this.group.add(mesh);
                });
            }

            // 3-D extruded format label — larger and thicker, right-aligned to corner.
            addLabel(font, text) {
                const shapes = font.generateShapes(text, 0.35);
                const geo    = new THREE.ExtrudeGeometry(shapes,
                    {steps: 1, depth: 0.06, bevelEnabled: false});
                geo.computeBoundingBox();
                geo.translate(-(geo.boundingBox.max.x - geo.boundingBox.min.x), 0, 0);
                const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
                    color:             this.color,
                    roughness:         0.1,
                    metalness:         0.8,
                    emissive:          this.color,
                    emissiveIntensity: 1.2,
                }));
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(2.7, 0.02, 2.7);
                this.group.add(mesh);
            }
        }

        // ── Pages ────────────────────────────────────────────────────────────
        const jsonPage    = new Page({y: 0,   color: 0xff6600});
        const turtlePage  = new Page({y: 1.5, color: 0x00ff66});
        const sparqlPage  = new Page({y: 3.0, color: 0x00bbff});

        // Font loads once; code text and labels are all 3-D from here on
        (async () => {
            const font = await new FontLoader().loadAsync('./fonts/helvetiker_bold.typeface.json');

            jsonPage.addCode(font, [
                '{',
                '  "@context": {',
                '    "foaf": "http://xmlns.com/foaf/0.1/",',
                '    "name": "foaf:name",',
                '    "knows": "foaf:knows"',
                '  },',
                '  "@graph": [',
                '    {',
                '      "@id": "https://avercruysse.be/#me",',
                '      "name": "Arthur Vercruysse"',
                '    },',
                '    {',
                '      "@id": "https://www.rubensworks.net/#me",',
                '      "name": "Ruben Taelman"',
                '    }',
                '  ]',
                '}',
            ], 0xffdd00);

            turtlePage.addCode(font, [
                '@prefix xsd: <http://www.w3.org/2001/XMLSchema#>.',
                '@prefix foaf: <http://xmlns.com/foaf/0.1/>.',
                '@prefix sh: <http://www.w3.org/ns/shacl#>.',
                '',
                '<PersonShape> a sh:NodeShape;',
                '  sh:targetClass foaf:Person;',
                '  sh:property [',
                '    sh:path foaf:name;',
                '    sh:datatype xsd:string;',
                '    sh:minCount 1;',
                '  ], [',
                '    sh:path foaf:knows;',
                '    sh:class foaf:Person;',
                '  ].',
            ], 0x44ffaa);

            sparqlPage.addCode(font, [
                'PREFIX foaf: <http://xmlns.com/foaf/0.1/>',
                '',
                'SELECT  *',
                '{',
                '   ?parson a foaf:Person;',
                '     foaf:name ?name;',
                '     foaf:friend [',
                '       foaf:name "Arthur Vercruysse"',
                '     ]',
                '}',
            ], 0x44eeff);

            jsonPage.addLabel(font,   'JSON-LD');
            turtlePage.addLabel(font, 'Turtle');
            sparqlPage.addLabel(font, 'SPARQL');
        })();

        // ── Resize ───────────────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ── Render loop ──────────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>

</html>
